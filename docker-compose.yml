version: "3.8"

services:
  backend:
    build: ./backend
    ports:
     - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/nexalearn
      - JWT_SECRET=your_secret_key
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    container_name: lms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: